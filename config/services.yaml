# config/services.yaml
parameters:
    app.frontend_url: '%env(APP_FRONTEND_URL)%'
    app.invitation_ttl: '%env(int:INVITATION_TOKEN_TTL)%'
    app.password_reset_ttl: '%env(int:PASSWORD_RESET_TOKEN_TTL)%'
    app.appointment_duration_minutes: '%env(int:APPOINTMENT_DURATION_MINUTES)%'
    app.slot_lock_ttl: '%env(int:SLOT_LOCK_TTL)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Domain/'
            - '../src/Application/*/DTO/'
            - '../src/Infrastructure/Persistence/Doctrine/Entity/'
            - '../src/Kernel.php'

    # Domain Interfaces -> Infrastructure Implementations
    App\Domain\User\Repository\UserRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineUserRepository

    App\Domain\User\Repository\InvitationTokenRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineInvitationTokenRepository

    App\Domain\User\Repository\PasswordResetTokenRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrinePasswordResetTokenRepository

    App\Domain\User\Service\PasswordHasherInterface:
        class: App\Infrastructure\Security\BcryptPasswordHasher

    App\Domain\User\Service\TokenGeneratorInterface:
        class: App\Infrastructure\Security\SecureTokenGenerator

    App\Domain\User\Service\EmailSenderInterface:
        class: App\Infrastructure\Email\SymfonyEmailSender

    App\Application\User\Handler\JwtTokenGeneratorInterface:
        class: App\Infrastructure\Security\JwtTokenGenerator

    # Handlers with specific configuration
    App\Application\User\Handler\InvitePatientHandler:
        arguments:
            $frontendUrl: '%app.frontend_url%'
            $invitationTtl: '%app.invitation_ttl%'

    App\Application\User\Handler\RequestPasswordResetHandler:
        arguments:
            $frontendUrl: '%app.frontend_url%'
            $passwordResetTtl: '%app.password_reset_ttl%'

    # Appointment Domain Interfaces -> Infrastructure Implementations
    App\Domain\Appointment\Repository\TherapistScheduleRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineTherapistScheduleRepository

    App\Domain\Appointment\Repository\ScheduleExceptionRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineScheduleExceptionRepository

    App\Domain\Appointment\Repository\AppointmentRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineAppointmentRepository

    App\Domain\Appointment\Repository\SlotLockRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineSlotLockRepository

    App\Domain\Appointment\Service\AvailabilityComputerInterface:
        class: App\Domain\Appointment\Service\AvailabilityComputer

    App\Domain\Appointment\Service\AppointmentEmailSenderInterface:
        class: App\Infrastructure\Email\AppointmentEmailSender

    # Appointment Handlers with specific configuration
    App\Application\Appointment\Handler\GetAvailableSlotsHandler:
        arguments:
            $appointmentDurationMinutes: '%app.appointment_duration_minutes%'

    App\Application\Appointment\Handler\LockSlotHandler:
        arguments:
            $appointmentDurationMinutes: '%app.appointment_duration_minutes%'
            $slotLockTtl: '%app.slot_lock_ttl%'

    App\Application\Appointment\Handler\RequestAppointmentHandler:
        arguments:
            $appointmentDurationMinutes: '%app.appointment_duration_minutes%'
