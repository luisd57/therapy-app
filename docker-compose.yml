version: '3.8'

services:
  php:
    build:
      context: ./API
      dockerfile: docker/php/Dockerfile
    container_name: therapy_php
    volumes:
      - ./API:/var/www/html
      - ./API/docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - postgres
      - redis
    networks:
      - therapy_network
    environment:
      - APP_ENV=dev
      - DATABASE_URL=postgresql://therapy_user:therapy_pass@postgres:5432/therapy_db?serverVersion=16&charset=utf8

  nginx:
    image: nginx:alpine
    container_name: therapy_nginx
    ports:
      - "8080:80"
    volumes:
      - ./API:/var/www/html
      - ./API/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - therapy_network

  postgres:
    image: postgres:16-alpine
    container_name: therapy_postgres
    environment:
      POSTGRES_DB: therapy_db
      POSTGRES_USER: therapy_user
      POSTGRES_PASSWORD: therapy_pass
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - therapy_network

  mailhog:
    image: mailhog/mailhog
    container_name: therapy_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - therapy_network

  redis:
    image: redis:7-alpine
    container_name: therapy_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-therapy_redis_pass}
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - therapy_network

  cron:
    build:
      context: ./API
      dockerfile: docker/cron/Dockerfile
    container_name: therapy_cron
    volumes:
      - ./API:/var/www/html
      - ./API/docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - postgres
      - redis
    networks:
      - therapy_network
    environment:
      - APP_ENV=dev
      - DATABASE_URL=postgresql://therapy_user:therapy_pass@postgres:5432/therapy_db?serverVersion=16&charset=utf8

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: therapy_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGPASSFILE: /tmp/pgpassfile
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./API/docker/pgadmin/servers.json:/pgadmin4/servers.json
      - ./API/docker/pgadmin/pgpassfile:/tmp/pgpassfile
    depends_on:
      - postgres
    networks:
      - therapy_network

networks:
  therapy_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
