version: '3.8'

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: therapy_php
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - postgres
    networks:
      - therapy_network
    environment:
      - APP_ENV=dev
      - DATABASE_URL=postgresql://therapy_user:therapy_pass@postgres:5432/therapy_db?serverVersion=16&charset=utf8

  nginx:
    image: nginx:alpine
    container_name: therapy_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - therapy_network

  postgres:
    image: postgres:16-alpine
    container_name: therapy_postgres
    environment:
      POSTGRES_DB: therapy_db
      POSTGRES_USER: therapy_user
      POSTGRES_PASSWORD: therapy_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - therapy_network

  mailhog:
    image: mailhog/mailhog
    container_name: therapy_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - therapy_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: therapy_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGPASSFILE: /tmp/pgpassfile
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json
      - ./docker/pgadmin/pgpassfile:/tmp/pgpassfile
    depends_on:
      - postgres
    networks:
      - therapy_network

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

networks:
  therapy_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
