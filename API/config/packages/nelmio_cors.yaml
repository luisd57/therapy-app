nelmio_cors:
    defaults:
        origin_regex: false
        allow_origin: ['%env(APP_FRONTEND_URL)%']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization']
        allow_credentials: true
        max_age: 3600
    paths:
        '^/api/': ~
